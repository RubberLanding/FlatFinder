name: WG Gesucht Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'   # Runs every 5 minutes

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Scraper
        run: python main.py

      - name: Commit and push memory
        run: |
          git config --global user.name "WG-Bot"
          git config --global user.email "actions@github.com"
          git add seen_ads.json
          git commit -m "Update seen ads [skip ci]" || exit 0
          git push